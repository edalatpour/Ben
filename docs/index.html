<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ben – A Franklin‑Inspired Daily Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Ben is a modern daily planner inspired by the Franklin planning method. Plan each day with clarity, priorities, and purpose."
  />
  <style>
    :root {
      --bg: #0b1020;
      --bg-alt: #111729;
      --accent: #4ea1ff;
      --accent-soft: rgba(78, 161, 255, 0.12);
      --text: #f5f7ff;
      --muted: #a5b0d0;
      --border: #222a3f;
      --radius: 12px;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.45);
      --max-width: 1040px;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: radial-gradient(circle at top, #1a2440 0, #050814 55%, #02030a 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      background: linear-gradient(
        to bottom,
        rgba(5, 8, 20, 0.9),
        rgba(5, 8, 20, 0.75)
      );
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .nav {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: radial-gradient(circle at 20% 0, #ffffff 0, #4ea1ff 40%, #1b4a9c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #02030a;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-text-main {
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: 16px;
    }

    .logo-text-sub {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.18s ease-out;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4ea1ff, #7bc4ff);
      color: #02030a;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
    }

    .btn-ghost {
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--muted);
      background: rgba(5, 8, 20, 0.6);
    }

    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: var(--text);
      background: rgba(10, 14, 30, 0.9);
    }

    main {
      flex: 1;
    }

    section {
      padding: 60px 20px;
    }

    .section-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    /* Hero */

    .hero {
      padding-top: 70px;
      padding-bottom: 70px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 40px;
      align-items: center;
    }

    .hero-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .hero-title {
      font-size: clamp(32px, 4vw, 42px);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .hero-title span {
      background: linear-gradient(135deg, #4ea1ff, #9fd4ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      font-size: 15px;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      background: rgba(5, 8, 20, 0.7);
    }

    .hero-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }

    .hero-caption {
      font-size: 12px;
      color: var(--muted);
    }

    .hero-device {
      background: radial-gradient(circle at top, #1b2a4a 0, #050814 60%);
      border-radius: 32px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      overflow: hidden;
    }

    .device-frame {
      border-radius: 26px;
      background: #050814;
      padding: 14px;
      border: 1px solid #1c2640;
      position: relative;
    }

    .device-notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 8px;
      border-radius: 999px;
      background: #050814;
      border: 1px solid #1c2640;
    }

    .device-screen {
      background: linear-gradient(145deg, #0b1020, #050814);
      border-radius: 18px;
      padding: 14px;
      border: 1px solid #1f2942;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 10px;
      color: var(--text);
      font-size: 11px;
    }

    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--muted);
    }

    .device-date {
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .device-pill {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(78, 161, 255, 0.12);
      color: #9fd4ff;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .device-column-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .task-priority {
      width: 18px;
      height: 18px;
      border
