# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: community-toolkit-datasync-server-aca
metadata:
  template: community-toolkit-datasync-server@8.0.0

# Keep ACA deploys pinned to the dedicated ACA resource group.
resourceGroup: rg-aca-${AZURE_ENV_NAME}

infra:
  provider: bicep
  path: ./infra
  module: main-aca

workflows:
  up:
    steps:
      - azd: provision
      - azd: deploy --all

services:
  backend:
    project: ./src/Ben.Datasync.Server
    language: csharp
    host: containerapp
    docker:
      # Dockerfile is at the datasync-server root; context includes both
      # the project source and any other files needed at build time.
      path: ./Dockerfile
      context: .
