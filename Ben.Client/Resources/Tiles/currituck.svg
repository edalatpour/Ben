<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <!-- Background mortar -->
  <rect width="1024" height="1024" fill="#e6d7c3"/>

  <!-- Define brick size -->
  <!-- Brick: 256x128, Mortar gap: 8px -->
  <defs>
    <rect id="brick" width="240" height="112" fill="#a33a2c"/>
  </defs>

  <!-- Row 1 (no offset) -->
  <use href="#brick" x="0" y="0"/>
  <use href="#brick" x="256" y="0"/>
  <use href="#brick" x="512" y="0"/>
  <use href="#brick" x="768" y="0"/>

  <!-- Row 2 (offset 50%) -->
  <use href="#brick" x="-128" y="128"/>
  <use href="#brick" x="128" y="128"/>
  <use href="#brick" x="384" y="128"/>
  <use href="#brick" x="640" y="128"/>
  <use href="#brick" x="896" y="128"/>

  <!-- Row 3 (repeat row 1) -->
  <use href="#brick" x="0" y="256"/>
  <use href="#brick" x="256" y="256"/>
  <use href="#brick" x="512" y="256"/>
  <use href="#brick" x="768" y="256"/>

  <!-- Row 4 (repeat row 2) -->
  <use href="#brick" x="-128" y="384"/>
  <use href="#brick" x="128" y="384"/>
  <use href="#brick" x="384" y="384"/>
  <use href="#brick" x="640" y="384"/>
  <use href="#brick" x="896" y="384"/>

  <!-- Continue pattern down to 1024px -->

  <!-- Row 3 (repeat row 1) -->
  <use href="#brick" x="0" y="512"/>
  <use href="#brick" x="256" y="512"/>
  <use href="#brick" x="512" y="512"/>
  <use href="#brick" x="768" y="512"/>

  <!-- Row 4 (repeat row 2) -->
  <use href="#brick" x="-128" y="640"/>
  <use href="#brick" x="128" y="640"/>
  <use href="#brick" x="384" y="640"/>
  <use href="#brick" x="640" y="640"/>
  <use href="#brick" x="896" y="640"/>

    <!-- Row 3 (repeat row 1) -->
  <use href="#brick" x="0" y="768"/>
  <use href="#brick" x="256" y="768"/>
  <use href="#brick" x="512" y="768"/>
  <use href="#brick" x="768" y="768"/>

  <!-- Row 4 (repeat row 2) -->
  <use href="#brick" x="-128" y="896"/>
  <use href="#brick" x="128" y="896"/>
  <use href="#brick" x="384" y="896"/>
  <use href="#brick" x="640" y="896"/>
  <use href="#brick" x="896" y="896"/>

</svg>

